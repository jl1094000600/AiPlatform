input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][service] {
    mutate {
      add_field => { "service_name" => "%{[fields][service]}" }
    }
  }

  json {
    source => "message"
    target => "parsed"
  }

  date {
    match => ["[parsed][timestamp]", "ISO8601"]
    target => "@timestamp"
  }

  if [parsed][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[parsed][traceId]}" }
    }
  }

  mutate {
    remove_field => ["parsed", "message", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "aiplatform-logs-%{+YYYY.MM.dd}"
  }
}

name: ai-platform

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ai_platform
      MYSQL_USER: ${MYSQL_USER:-ai_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/00-bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
      - ../backend/sql:/opt/aiplatform/sql:ro
      - ../backend/src/main/resources:/opt/aiplatform/resources:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ai-platform

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - ai-platform

  backend:
    image: ${BACKEND_IMAGE:-ai-platform-backend:local}
    build:
      context: ../backend
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/ai_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-ai_app}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MANAGEMENT_ENDPOINTS_WEB_BASE_PATH: /api/actuator
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
      JWT_SECRET: ${JWT_SECRET}
      AGENT_HEARTBEAT_SECRET: ${AGENT_HEARTBEAT_SECRET}
      BOOTSTRAP_ADMIN_PASSWORD_HASH: ${BOOTSTRAP_ADMIN_PASSWORD_HASH}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AIPAL_DATASET_STORAGE_DIR: /app/data/datasets
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - dataset_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - ai-platform

  front:
    image: ${FRONT_IMAGE:-ai-platform-front:local}
    build:
      context: ../front
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONT_PORT:-80}:80"
    volumes:
      - ./nginx/aiplatform.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ai-platform

networks:
  ai-platform:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  dataset_data:

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  application:
    name: ai-platform
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:55MB}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: warn
    com.aipal: warn
    org.mybatis: warn
    com.baomidou.mybatisplus: warn

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3100,http://localhost:5173}

security:
  bootstrap-admin-password-hash: ${BOOTSTRAP_ADMIN_PASSWORD_HASH}
  agent-heartbeat-secret: ${AGENT_HEARTBEAT_SECRET}

aipal:
  scheduling:
    workflow-trigger-delay-ms: ${WORKFLOW_TRIGGER_DELAY_MS:60000}
    initial-delay-ms: ${SCHEDULING_INITIAL_DELAY_MS:30000}
  requirements:
    storage-root: ${REQUIREMENT_STORAGE_ROOT:${java.io.tmpdir}/aiplatform-requirements}
    max-image-bytes: ${REQUIREMENT_MAX_IMAGE_BYTES:15728640}
    max-audio-bytes: ${REQUIREMENT_MAX_AUDIO_BYTES:52428800}
    max-attachments: ${REQUIREMENT_MAX_ATTACHMENTS:20}
    retention-days: ${REQUIREMENT_RETENTION_DAYS:30}
    cleanup-delay-ms: ${REQUIREMENT_CLEANUP_DELAY_MS:3600000}
  asr:
    dashscope:
      endpoint: ${DASHSCOPE_ASR_ENDPOINT:wss://dashscope.aliyuncs.com/api-ws/v1/inference}
      model: ${DASHSCOPE_ASR_MODEL:paraformer-realtime-v2}
    realtime:
      sample-rate: ${REALTIME_ASR_SAMPLE_RATE:16000}
      format: ${REALTIME_ASR_FORMAT:pcm_s16le}
      session-ttl-seconds: ${REALTIME_ASR_SESSION_TTL_SECONDS:120}
      connect-timeout-seconds: ${REALTIME_ASR_CONNECT_TIMEOUT_SECONDS:10}
      max-duration-seconds: ${REALTIME_ASR_MAX_DURATION_SECONDS:300}
      max-audio-bytes: ${REALTIME_ASR_MAX_AUDIO_BYTES:15728640}
      max-frame-bytes: ${REALTIME_ASR_MAX_FRAME_BYTES:32768}

spring-ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}

tts:
  provider: edge
  edge:
    voice: zh-CN-XiaoxiaoNeural
  output-dir: /tmp/tts
  agent:
    code: tts-agent
    name: TTS语音合成Agent
    enabled: true
